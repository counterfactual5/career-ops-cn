# career-ops-cn — 插件系统说明
#
# ⚠️ 本项目不支持插件系统。
#
# 原版 career-ops 有一个插件机制（apify、notion、gmail 等），用于扩展
# 职位来源和数据同步。career-ops-cn 走 Agent 驱动路线，不需要这些集成：
#
#   - 职位来源：用户主动截图/粘贴 JD，无需 apify 扫描
#   - 数据同步：本地文件优先（data/、reports/），无需 notion 镜像
#   - 邮件导入：通过 Agent 直接读取或粘贴，无需 gmail API
#
# 如果你确实需要某个原版插件的等价功能，可以：
#   1. 让 Agent 在对话中帮你完成对应任务（推荐）
#   2. 自行编写脚本放到 scripts/ 目录下
#
# 此文件保留是为了让从原版迁移过来的用户了解差异。
