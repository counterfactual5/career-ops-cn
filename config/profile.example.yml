# Career-Ops CN 个人配置
# 复制此文件为 config/profile.yml，填入你自己的信息。
# 这是所有 modes 共享的个人信息唯一数据源。

candidate:
  full_name: "张三"
  email: "zhangsan@example.com"
  phone: "+86 138-0000-0000"
  location: "北京"
  linkedin: ""  # 中国用户可留空，或填脉脉/拉勾主页
  portfolio_url: ""  # 个人网站/博客
  github: "github.com/zhangsan"
  # 简历照片：中国大陆 ATS 一般不要求照片，建议留空
  # 仅当目标公司明确要求时再填，使用本地文件路径或 data: URL
  photo: ""

target_roles:
  # 你的北极星目标岗位
  primary:
    - "资深 AI 工程师"
    - "资深算法工程师"
  # 画像分类帮助评估系统打分（参见 modes/_shared.md 的画像检测）
  archetypes:
    - name: "AI 平台 / LLMOps 工程师"
      level: "资深"
      fit: "primary"        # primary = 梦想岗位, secondary = 良好匹配, adjacent = 拉伸尝试
    - name: "Agent / 自动化工程师"
      level: "资深"
      fit: "secondary"
    - name: "AI 解决方案架构师"
      level: "中高级"
      fit: "adjacent"

narrative:
  # 一句话职业标签
  headline: "从全栈转型 AI 工程的应用型选手"
  # 你的独特性故事
  exit_story: "5 年大厂经验，主导过 X 业务从 0 到 1 的 AI 落地。"
  # 你的 3-5 个核心优势
  superpowers:
    - "端到端 ML 流水线搭建"
    - "快速原型（2 周内 idea 到上线）"
    - "跨团队沟通与业务落地"
  # 项目/文章/案例（必须包含量化指标）
  proof_points:
    - name: "项目 A"
      url: ""
      hero_metric: "推理延迟降低 40%"
    - name: "开源工具 B"
      url: "https://github.com/zhangsan/tool"
      hero_metric: "GitHub 2K+ stars"

compensation:
  # 中国市场薪酬（税前年薪，单位：万元人民币）
  target_range: "60-80 万"
  currency: "CNY"
  minimum: "50 万"  # 低于此数字不考虑
  # 期望构成（可选）
  # base_monthly: "35K"  # 期望月薪
  # months: 15           # 期望发薪月数（12 + 年终）
  location_flexibility: "优先远程，可接受每周 1-2 天到岗"

location:
  country: "中国"
  city: "北京"
  timezone: "GMT+8"
  # 户籍/落户相关
  hukou_status: ""  # 是否需要落户指标
  visa_status: "无需工作签证"

# ── 求职信 (Cover Letter) 设置 ─────────────────────────────────
#
# 用于生成中文求职信。所有字段可选。
cover_letter:
  # 离职通知期（天）
  notice_period_days: 30
  # 当前所在业务领域
  primary_domain: "互联网/AI"

# ── 自动 PDF 生成阈值 ──────────────────────────────────────────
#
# 评估过程中，仅当岗位评分 >= 此阈值时自动生成定制简历 PDF。
# PDF 生成每次耗时约 30-60 秒，多数岗位评分在 2-3 分，自动跳过可节省时间。
# 默认值（不配置时）：3.0
# 调高（如 4.0）只为强匹配岗位生成 PDF；设为 0 则所有岗位都生成。
# auto_pdf_score_threshold: 4.0

# ── 重复投递冷却期 ─────────────────────────────────────────────
#
# 针对最近投递过的公司设置冷却期，避免短期内重复投递。
#
# re_apply_windows:
#   字节跳动:
#     same_role_days: 180
#     applied_to: ["资深 AI 工程师"]
#     last_apply_date: "2026-01-01"
